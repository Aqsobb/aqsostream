<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Premium Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
        .aspect-video iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .active-tab { border-bottom: 2px solid #ef4444; color: #ef4444; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans antialiased min-h-screen flex flex-col">

    <nav class="bg-gray-900/95 backdrop-blur-md sticky top-0 z-40 border-b border-gray-800 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="font-black text-2xl tracking-tighter text-white cursor-pointer" onclick="switchTab('home')">AQSO<span class="text-red-600">STREAM</span></h1>
            
            <div id="auth-section" class="flex items-center gap-4">
                <button id="btn-login" onclick="loginGoogle()" class="bg-blue-600 hover:bg-blue-700 text-sm font-bold px-4 py-2 rounded-lg transition shadow-lg flex items-center gap-2">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="white"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
                    Login Google
                </button>
                
                <div id="user-profile" class="hidden flex items-center gap-3">
                    <img id="user-avatar" src="" class="w-8 h-8 rounded-full border border-gray-600">
                    <div class="hidden md:block">
                        <p id="user-name" class="text-xs font-bold"></p>
                    </div>
                    <button onclick="logout()" class="text-xs bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded transition">Logout</button>
                </div>
            </div>
        </div>
        <div class="max-w-7xl mx-auto px-4 flex gap-6 text-sm font-bold text-gray-400">
            <button id="tab-home" onclick="switchTab('home')" class="py-3 active-tab transition">Katalog Terbaru</button>
            <button id="tab-history" onclick="switchTab('history')" class="py-3 hover:text-white transition hidden">Riwayat Nonton</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 w-full flex-1 relative">
        
        <section id="player-section" class="hidden mb-12 bg-gray-800 p-4 md:p-6 rounded-2xl border border-gray-700 shadow-2xl relative">
            <button onclick="closePlayer()" class="absolute -top-4 -right-4 bg-gray-700 hover:bg-red-600 text-white rounded-full p-2 shadow-lg z-10 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 id="player-title" class="text-xl md:text-2xl font-bold mb-4 text-white border-b border-gray-700 pb-2">Memuat Player...</h2>
            
            <div class="relative w-full pb-[56.25%] bg-black rounded-xl overflow-hidden shadow-inner border border-gray-900" id="video-frame-container"></div>
            
            <div class="mt-4 bg-gray-900 p-4 rounded-xl border border-gray-700">
                <h3 class="text-sm font-bold text-gray-400 mb-3">Mirror Link Server</h3>
                <div id="mirror-list" class="flex flex-wrap gap-2"></div>
            </div>
        </section>

        <div id="loader" class="flex flex-col items-center justify-center py-20">
            <div class="w-10 h-10 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-gray-400 font-medium">Sinkronisasi Database Anime...</p>
        </div>

        <div id="content-area">
            <div id="catalog" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            
            <div id="pagination" class="flex justify-center items-center gap-4 mt-12 hidden">
                <button onclick="changePage(-1)" id="btn-prev" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg font-bold disabled:opacity-50 transition">Sebelumnya</button>
                <span id="page-info" class="font-bold text-gray-400">Hal 1</span>
                <button onclick="changePage(1)" id="btn-next" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg font-bold disabled:opacity-50 transition">Selanjutnya</button>
            </div>
        </div>
    </main>

    <div id="episode-modal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 w-full max-w-2xl rounded-2xl border border-gray-700 shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-5 border-b border-gray-800 flex justify-between items-start bg-gray-800">
                <div>
                    <h2 id="modal-title" class="text-xl font-bold text-white mb-1">Judul Anime</h2>
                    <span id="modal-ep-count" class="text-xs bg-red-600/20 text-red-500 font-bold px-2 py-1 rounded">0 Eps</span>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-700 hover:bg-red-600 rounded-lg p-2 transition">Tutup</button>
            </div>
            <div class="px-5 py-3 bg-gray-800 border-b border-gray-700">
                <p id="modal-synopsis" class="text-xs text-gray-400 line-clamp-3">Sinopsis tidak tersedia.</p>
            </div>
            <div class="p-4 overflow-y-auto bg-gray-900 flex-1" id="modal-ep-list"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCsUEn7Arp5q1OVCh6jRssfZT31yiaZuag",
            authDomain: "dtabase-80c9a.firebaseapp.com",
            databaseURL: "https://dtabase-80c9a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dtabase-80c9a",
            storageBucket: "dtabase-80c9a.firebasestorage.app",
            messagingSenderId: "800365836046",
            appId: "1:800365836046:web:bc8ecc9112f014a6e9095f"
        };
        // ==========================================

        const HUGGINGFACE_API = "https://anggasi-wi.hf.space/scrape";

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let allAnime = [];
        let historyAnime = [];
        let currentUser = null;
        let currentPage = 1;
        const itemsPerPage = 20;
        let currentTab = 'home';

        // --- AUTHENTICATION ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('tab-history').classList.remove('hidden');
                loadHistory(); 
            } else {
                currentUser = null;
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile').classList.add('hidden');
                document.getElementById('tab-history').classList.add('hidden');
                if(currentTab === 'history') switchTab('home');
            }
        });

        function loginGoogle() { auth.signInWithPopup(provider).catch(err => alert("Gagal Login: " + err.message)); }
        function logout() { auth.signOut(); }

        // --- DATABASE FETCHING ---
        async function fetchDatabase() {
            try {
                db.ref('anichin_database').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        allAnime = Object.keys(data)
                            .map(key => ({ id: key, ...data[key] }))
                            .filter(item => item.title && item.id !== "single_scrapes")
                            .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0)); 
                    }
                    if(currentTab === 'home') renderGrid();
                });
            } catch (err) {
                document.getElementById('loader').innerHTML = `<span class="text-red-500 font-bold">Error Database: ${err.message}.</span>`;
            }
        }

        async function loadHistory() {
            if(!currentUser) return;
            db.ref(`users/${currentUser.uid}/history`).on('value', (snapshot) => {
                const data = snapshot.val();
                historyAnime = data ? Object.values(data).sort((a,b) => b.last_watched - a.last_watched) : [];
                if(currentTab === 'history') renderGrid();
            });
        }

        // --- RENDER GRID ---
        function renderGrid() {
            document.getElementById('loader').style.display = 'none';
            const catalogEl = document.getElementById('catalog');
            const paginationEl = document.getElementById('pagination');
            catalogEl.innerHTML = '';
            
            const dataSource = currentTab === 'home' ? allAnime : historyAnime;
            
            if (dataSource.length === 0) {
                catalogEl.innerHTML = `<div class="col-span-full py-10 text-center text-gray-500 font-bold text-lg">Katalog Kosong / Sedang ditarik engine.</div>`;
                paginationEl.classList.add('hidden');
                return;
            }

            const startIdx = (currentPage - 1) * itemsPerPage;
            const paginatedData = dataSource.slice(startIdx, startIdx + itemsPerPage);

            paginatedData.forEach(anime => {
                const card = document.createElement('div');
                card.className = "bg-gray-800 rounded-xl overflow-hidden cursor-pointer group hover:-translate-y-1 transition shadow-lg border border-gray-700 hover:border-red-500";
                
                const referensi = currentTab === 'history' ? (allAnime.find(a => a.id === anime.anime_id) || anime) : anime;
                const cover = referensi.cover || "https://via.placeholder.com/300x450/111827/ef4444?text=AQSO";
                let extraTag = currentTab === 'history' ? `<span class="bg-blue-600 text-[10px] px-2 py-1 rounded shadow">Terakhir: ${anime.last_ep_title}</span>` : `<span class="bg-red-600 text-[10px] font-black px-2 py-1 rounded shadow">${referensi.total_episodes || '?'} Eps</span>`;

                card.innerHTML = `
                    <div class="relative aspect-[2/3] overflow-hidden">
                        <img src="${cover}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent opacity-80"></div>
                        <div class="absolute bottom-2 left-2 right-2">${extraTag}</div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-xs md:text-sm text-gray-200 line-clamp-2 leading-tight group-hover:text-red-400">${referensi.title}</h3>
                    </div>
                `;
                card.onclick = () => openModal(referensi);
                catalogEl.appendChild(card);
            });

            paginationEl.classList.remove('hidden');
            document.getElementById('page-info').innerText = `Hal ${currentPage} dari ${Math.ceil(dataSource.length / itemsPerPage)}`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage >= Math.ceil(dataSource.length / itemsPerPage);
        }

        function changePage(direction) {
            currentPage += direction;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderGrid();
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;
            document.getElementById('tab-home').classList.toggle('active-tab', tab === 'home');
            document.getElementById('tab-home').classList.toggle('text-white', tab === 'home');
            document.getElementById('tab-history').classList.toggle('active-tab', tab === 'history');
            document.getElementById('tab-history').classList.toggle('text-white', tab === 'history');
            renderGrid();
        }

        // --- ARSITEKTUR MODAL (KIRIM ID EPISODE KE PLAYER) ---
        function openModal(anime) {
            document.getElementById('modal-title').innerText = anime.title;
            document.getElementById('modal-synopsis').innerText = anime.synopsis || "Sinopsis tidak tersedia.";
            document.getElementById('modal-ep-count').innerText = `${anime.total_episodes || 0} Episode Tersedia`;
            const epList = document.getElementById('modal-ep-list');
            epList.innerHTML = '';

            if (anime.episodes) {
                // Konversi Object ke Array dengan mengikutkan ID-nya
                let episodesArray = Object.keys(anime.episodes).map(key => ({
                    epId: key,
                    ...anime.episodes[key]
                }));
                
                // Sorting otomatis (Terbaru di atas)
                episodesArray.sort((a, b) => {
                    const numA = parseFloat(a.number.replace(/[^\d.]/g, '')) || 0;
                    const numB = parseFloat(b.number.replace(/[^\d.]/g, '')) || 0;
                    return numB - numA; 
                });

                if (episodesArray.length > 0) {
                    episodesArray.forEach(ep => {
                        // Pass anime.id dan ep.epId agar Player bisa ngambil data Instant dari Firebase
                        epList.innerHTML += `
                            <button onclick="playVideo('${anime.id}', '${ep.epId}')" class="w-full text-left p-4 mb-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl flex items-center justify-between group transition">
                                <div>
                                    <span class="block text-xs text-red-500 font-bold mb-1">${ep.number}</span>
                                    <span class="block text-sm text-white font-medium">${ep.title || 'Buka Pemutar Video'}</span>
                                </div>
                                <svg class="w-6 h-6 text-gray-500 group-hover:text-white transition" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </button>
                        `;
                    });
                } else {
                    epList.innerHTML = `<div class="p-6 text-center text-gray-500 font-bold">Sedang menarik data dari server...</div>`;
                }
            } else {
                epList.innerHTML = `<div class="p-6 text-center text-gray-500 font-bold border border-dashed border-gray-700 rounded-xl">Episode belum terindeks. Engine scraper mungkin masih berjalan.</div>`;
            }
            
            document.getElementById('episode-modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('episode-modal').classList.add('hidden'); }

        // --- INSTANT PLAYER ENGINE (ZERO LOADING) ---
        async function playVideo(animeId, epId) {
            closeModal();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Cari data episode murni dari state global Firebase
            const anime = allAnime.find(a => a.id === animeId);
            if (!anime || !anime.episodes || !anime.episodes[epId]) return alert("Data episode tidak ditemukan.");
            
            const ep = anime.episodes[epId];
            const section = document.getElementById('player-section');
            const frame = document.getElementById('video-frame-container');
            
            section.classList.remove('hidden');
            document.getElementById('player-title').innerText = `${anime.title} - ${ep.number}`;
            document.getElementById('mirror-list').innerHTML = '';

            // Update Riwayat ke Firebase
            if(currentUser) {
                db.ref(`users/${currentUser.uid}/history/${animeId}`).set({
                    anime_id: animeId, title: anime.title, last_ep_url: ep.url,
                    last_ep_title: ep.number, last_watched: Date.now()
                });
            }

            // LOGIKA UTAMA: CEK JIKA VIDEO URL SUDAH ADA DI FIREBASE (INSTANT PLAY)
            if (ep.videoUrl && ep.videoUrl !== "") {
                frame.innerHTML = `<iframe src="${ep.videoUrl}" allowfullscreen class="w-full h-full absolute top-0 left-0 border-0 rounded-xl"></iframe>`;
                
                if (ep.mirrors && ep.mirrors.length > 0) {
                    ep.mirrors.forEach(m => {
                        document.getElementById('mirror-list').innerHTML += `<a href="${m.link}" target="_blank" class="bg-gray-800 border border-gray-600 hover:bg-red-600 hover:border-red-600 text-xs px-3 py-2 rounded transition">${m.server}</a>`;
                    });
                } else {
                    document.getElementById('mirror-list').innerHTML = `<span class="text-xs text-gray-500">Tidak ada mirror alternatif.</span>`;
                }
            } 
            // FALLBACK: HANYA TEMBAK API JIKA DATABASE KOSONG
            else {
                frame.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center text-red-500 bg-black"><div class="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-2"></div><span class="text-xs font-bold text-gray-300">Menarik data dari fallback server...</span></div>`;
                try {
                    const res = await fetch(`${HUGGINGFACE_API}?url=${encodeURIComponent(ep.url)}`);
                    const out = await res.json();

                    if (out.status === "success" && out.data.videoUrl) {
                        frame.innerHTML = `<iframe src="${out.data.videoUrl}" allowfullscreen class="w-full h-full absolute top-0 left-0 border-0 rounded-xl"></iframe>`;
                        if(out.data.mirrors && out.data.mirrors.length > 0) {
                            out.data.mirrors.forEach(m => {
                                document.getElementById('mirror-list').innerHTML += `<a href="${m.link}" target="_blank" class="bg-gray-800 border border-gray-600 hover:bg-red-600 text-xs px-3 py-2 rounded transition">${m.server}</a>`;
                            });
                        }
                    } else throw new Error("Video gagal diekstrak dari server sumber.");
                } catch (err) {
                    frame.innerHTML = `<div class="absolute inset-0 flex flex-col items-center justify-center bg-gray-900 text-red-500 p-4 text-center border border-red-900 rounded-xl"><span class="font-bold mb-2">Gagal Memuat Player</span><p class="text-xs mb-4 text-gray-400">${err.message}</p><button onclick="playVideo('${animeId}', '${epId}')" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">Coba Lagi</button></div>`;
                }
            }
        }

        function closePlayer() {
            document.getElementById('player-section').classList.add('hidden');
            document.getElementById('video-frame-container').innerHTML = ''; 
        }

        fetchDatabase();
    </script>
</body>
</html>

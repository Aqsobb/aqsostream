<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AQSO STREAM - Premium App</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050811; color: #e2e8f0; overflow-x: hidden; -webkit-tap-highlight-color: transparent; padding-bottom: 70px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050811; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
        
        .nav-blur { background: rgba(5, 8, 17, 0.85); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .bottom-nav-blur { background: rgba(5, 8, 17, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); }
        .hero-gradient { background: linear-gradient(0deg, #050811 0%, rgba(5,8,17,0.2) 50%, rgba(5,8,17,0) 100%); }
        .modal-bg { background: rgba(5, 8, 17, 0.95); backdrop-filter: blur(15px); }
        
        .premium-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .premium-card:active { transform: scale(0.98); border-color: #e50914; }
        @media (min-width: 768px) { .premium-card:hover { transform: translateY(-5px); border-color: #e50914; box-shadow: 0 10px 30px -10px rgba(229, 9, 20, 0.3); } }
        
        .loader-spin { animation: spin 1.5s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <div id="initial-loader" class="fixed inset-0 z-[100] bg-[#050811] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative w-20 h-20 mb-4">
            <div class="absolute inset-0 border-t-4 border-[#e50914] rounded-full loader-spin"></div>
            <div class="absolute inset-0 flex items-center justify-center font-black text-[#e50914] tracking-tighter">AQSO</div>
        </div>
        <p class="text-gray-500 text-[10px] font-bold tracking-widest uppercase animate-pulse">Menyinkronkan Database...</p>
    </div>

    <nav class="fixed w-full z-40 nav-blur transition-all duration-300 hidden md:block">
        <div class="max-w-7xl mx-auto px-8 py-4 flex justify-between items-center">
            <h1 class="font-extrabold text-2xl tracking-tighter cursor-pointer" onclick="goHome()">
                AQSO<span class="text-[#e50914]">STREAM</span>
            </h1>
            <div id="auth-section-desktop"></div>
        </div>
    </nav>

    <div class="md:hidden fixed top-0 w-full z-40 nav-blur px-4 py-3 flex justify-between items-center">
        <h1 class="font-black text-xl tracking-tighter">AQSO<span class="text-[#e50914]">STREAM</span></h1>
        <div id="status-indicator" class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e] animate-pulse"></div>
    </div>

    <main class="pt-16 md:pt-24 pb-6 w-full flex-1">
        
        <div id="hero-section" class="relative w-full h-[50vh] md:h-[60vh] hidden fade-in">
            <div id="hero-bg" class="absolute inset-0 bg-cover bg-center bg-no-repeat transition-all duration-700"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#050811] via-[#050811]/60 to-transparent"></div>
            <div class="absolute bottom-0 left-0 w-full pb-8 px-4 md:px-12 max-w-7xl mx-auto">
                <span class="bg-[#e50914] text-white text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded shadow-lg">Trending</span>
                <h2 id="hero-title" class="text-3xl md:text-5xl font-black mt-2 mb-2 leading-tight drop-shadow-xl text-white"></h2>
                <p id="hero-synopsis" class="text-xs md:text-sm text-gray-300 line-clamp-2 md:line-clamp-3 mb-4 max-w-2xl"></p>
                <button id="hero-play-btn" class="bg-white text-black font-bold py-2.5 px-6 rounded-lg shadow-xl flex items-center gap-2 active:scale-95 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Putar Video
                </button>
            </div>
        </div>

        <div id="catalog-section" class="max-w-7xl mx-auto px-4 md:px-8 mt-8 hidden fade-in">
            <h3 class="text-lg font-bold mb-4 text-white border-l-4 border-[#e50914] pl-3">Rilis Terbaru</h3>
            <div id="catalog" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-6"></div>
        </div>

        <section id="player-section" class="hidden max-w-6xl mx-auto px-4 md:px-8 py-4 fade-in">
            <div class="flex justify-between items-center mb-4">
                <button onclick="goHome()" class="text-gray-400 hover:text-white text-xs font-bold flex items-center gap-1 transition bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Kembali
                </button>
            </div>
            
            <h2 id="player-title" class="text-xl md:text-2xl font-black mb-4 text-white">Memuat Player...</h2>
            
            <div class="relative w-full pb-[56.25%] bg-black rounded-xl shadow-2xl overflow-hidden border border-white/10" id="video-frame-container"></div>
            
            <div class="mt-4 bg-white/5 p-4 rounded-xl border border-white/5">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Pilih Server (Anti-Lag)</h3>
                <div id="mirror-list" class="flex flex-wrap gap-2"></div>
            </div>

            <div class="mt-6 bg-white/5 p-4 md:p-6 rounded-xl border border-white/5">
                <h3 class="text-sm font-bold mb-4 flex items-center gap-2 text-white">
                    Komentar Netizen <span id="comment-count" class="bg-[#e50914] text-white text-[10px] px-2 py-0.5 rounded">0</span>
                </h3>
                
                <div id="comment-box" class="mb-6">
                    <div id="comment-input-area" class="hidden">
                        <textarea id="comment-text" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-xs text-white focus:border-[#e50914] outline-none transition resize-none" rows="2" placeholder="Tulis komentar kerenmu di sini..."></textarea>
                        <button onclick="postComment()" class="mt-2 bg-[#e50914] text-white text-xs font-bold py-2 px-5 rounded-lg float-right active:scale-95 transition">Kirim</button>
                        <div class="clear-both"></div>
                    </div>
                    <div id="comment-lock" class="p-4 text-center border border-dashed border-white/10 rounded-lg bg-black/30">
                        <p class="text-xs text-gray-400 mb-2">Login pakai Google buat ikutan komen.</p>
                        <button onclick="loginGoogle()" class="text-white bg-[#e50914] text-[10px] font-bold py-1.5 px-4 rounded-full">Login Sekarang</button>
                    </div>
                </div>
                <div id="comments-display" class="space-y-4 max-h-[400px] overflow-y-auto"></div>
            </div>
        </section>
    </main>

    <div id="episode-modal" class="fixed inset-0 modal-bg z-[60] hidden flex items-end md:items-center justify-center transition-opacity">
        <div class="bg-[#050811] w-full md:max-w-2xl rounded-t-2xl md:rounded-2xl border-t md:border border-white/10 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col max-h-[85vh] fade-in">
            <div class="p-4 border-b border-white/5 flex justify-between items-center bg-[#0a0f1d]">
                <div>
                    <h2 id="modal-title" class="text-sm md:text-lg font-black text-white line-clamp-1">Judul Anime</h2>
                    <span id="modal-ep-count" class="text-[10px] text-[#e50914] font-bold tracking-widest uppercase">0 Eps</span>
                </div>
                <button onclick="closeModal()" class="bg-white/10 hover:bg-[#e50914] rounded-full p-2 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-3 overflow-y-auto flex-1 bg-[#050811] grid grid-cols-1 md:grid-cols-2 gap-2" id="modal-ep-list"></div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 modal-bg z-[70] hidden flex items-center justify-center p-4 transition-opacity">
        <div class="bg-[#0a0f1d] w-full max-w-sm rounded-2xl p-6 border border-white/10 shadow-2xl fade-in relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-[#e50914]/20 rounded-full blur-3xl"></div>
            
            <h2 class="text-lg font-black mb-5 text-center text-white relative z-10">Profil Kamu</h2>
            
            <div id="profile-logged-in" class="hidden relative z-10">
                <div class="flex flex-col items-center gap-3 mb-5">
                    <img id="edit-avatar" src="" class="w-20 h-20 rounded-full border-2 border-[#e50914] shadow-lg object-cover">
                </div>
                <div class="mb-4">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1.5">Ubah Nama Tampilan</label>
                    <input type="text" id="edit-name" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-sm text-white focus:border-[#e50914] outline-none transition text-center font-bold">
                </div>
                <div class="mb-5">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest block mb-1.5">Email Penagihan</label>
                    <input type="text" id="edit-email" class="w-full bg-white/5 border border-white/5 rounded-lg p-3 text-sm text-gray-500 outline-none" value="aqso@gmail.com" readonly>
                </div>
                <div class="flex gap-2 mb-4">
                    <button onclick="closeSettings()" class="flex-1 bg-white/5 py-2.5 rounded-lg font-bold text-xs border border-white/5 active:scale-95">Batal</button>
                    <button onclick="saveProfile()" class="flex-1 bg-[#e50914] py-2.5 rounded-lg font-bold text-xs text-white shadow-lg active:scale-95">Simpan</button>
                </div>
                <button onclick="logout()" class="w-full py-2 text-[10px] font-bold text-gray-500 hover:text-red-500 border border-white/5 rounded-lg active:scale-95 transition">LOGOUT DARI SISTEM</button>
            </div>

            <div id="profile-logged-out" class="relative z-10 text-center py-4">
                <svg class="w-12 h-12 mx-auto text-gray-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                <p class="text-xs text-gray-400 mb-4">Akses eksklusif untuk edit profil dan riwayat tontonan.</p>
                <button onclick="loginGoogle()" class="w-full bg-[#e50914] text-white text-xs font-bold py-3 rounded-lg shadow-lg active:scale-95 transition">Login Sekarang</button>
                <button onclick="closeSettings()" class="w-full mt-2 bg-transparent text-gray-500 text-[10px] py-2">Tutup Layar Ini</button>
            </div>
        </div>
    </div>

    <div class="md:hidden fixed bottom-0 w-full bottom-nav-blur z-50 flex justify-around items-center pb-2 pt-2">
        <button onclick="goHome()" id="nav-home" class="flex flex-col items-center p-2 text-[#e50914] transition w-16">
            <svg class="w-5 h-5 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="text-[9px] font-bold tracking-wide">Beranda</span>
        </button>
        <button onclick="openSettings()" id="nav-profile" class="flex flex-col items-center p-2 text-gray-500 hover:text-white transition w-16">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
            <span class="text-[9px] font-bold tracking-wide">Profilku</span>
        </button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCsUEn7Arp5q1OVCh6jRssfZT31yiaZuag",
            authDomain: "dtabase-80c9a.firebaseapp.com",
            databaseURL: "https://dtabase-80c9a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dtabase-80c9a",
            storageBucket: "dtabase-80c9a.firebasestorage.app",
            messagingSenderId: "800365836046",
            appId: "1:800365836046:web:bc8ecc9112f014a6e9095f"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let allAnime = [];
        let currentAnimeId = null;
        let currentUser = null;

        // AUTH ENGINE
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                db.ref(`users/${user.uid}/profile`).on('value', (snap) => {
                    const profile = snap.val();
                    const name = profile ? profile.displayName : user.displayName;
                    document.getElementById('edit-name').value = name;
                    document.getElementById('edit-avatar').src = user.photoURL;
                });
                
                document.getElementById('profile-logged-in').classList.remove('hidden');
                document.getElementById('profile-logged-out').classList.add('hidden');
                document.getElementById('comment-input-area').classList.remove('hidden');
                document.getElementById('comment-lock').classList.add('hidden');
                
                // Update Desktop Auth UI (Optional)
                document.getElementById('auth-section-desktop').innerHTML = `<img src="${user.photoURL}" onclick="openSettings()" class="w-8 h-8 rounded-full border border-[#e50914] cursor-pointer">`;
            } else {
                currentUser = null;
                document.getElementById('profile-logged-in').classList.add('hidden');
                document.getElementById('profile-logged-out').classList.remove('hidden');
                document.getElementById('comment-input-area').classList.add('hidden');
                document.getElementById('comment-lock').classList.remove('hidden');
                document.getElementById('auth-section-desktop').innerHTML = `<button onclick="loginGoogle()" class="text-white bg-[#e50914] text-xs font-bold px-4 py-1.5 rounded-full">Login</button>`;
            }
        });

        function loginGoogle() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); closeSettings(); goHome(); }

        // NAVIGATION LOGIC
        function goHome() {
            document.getElementById('player-section').classList.add('hidden');
            document.getElementById('hero-section').classList.remove('hidden');
            document.getElementById('catalog-section').classList.remove('hidden');
            document.getElementById('video-frame-container').innerHTML = ''; 
            
            // Ubah warna icon nav bawah
            document.getElementById('nav-home').classList.replace('text-gray-500', 'text-[#e50914]');
            document.getElementById('nav-profile').classList.replace('text-[#e50914]', 'text-gray-500');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function openSettings() {
            document.getElementById('settings-modal').classList.remove('hidden');
            document.getElementById('nav-profile').classList.replace('text-gray-500', 'text-[#e50914]');
            document.getElementById('nav-home').classList.replace('text-[#e50914]', 'text-gray-500');
        }

        function closeSettings() {
            document.getElementById('settings-modal').classList.add('hidden');
            document.getElementById('nav-home').classList.replace('text-gray-500', 'text-[#e50914]');
            document.getElementById('nav-profile').classList.replace('text-[#e50914]', 'text-gray-500');
        }

        function saveProfile() {
            const newName = document.getElementById('edit-name').value;
            db.ref(`users/${currentUser.uid}/profile`).update({ displayName: newName }).then(() => closeSettings());
        }

        // DATABASE SYNC (Realtime)
        db.ref('anichin_database').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                allAnime = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                    .filter(i => i.title && i.id !== "single_scrapes")
                    .sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            }
            
            // Matikan loading layar hitam
            const loader = document.getElementById('initial-loader');
            if(loader) { loader.classList.add('opacity-0'); setTimeout(() => loader.remove(), 500); }
            
            // Update UI jika user ada di halaman home
            if(!document.getElementById('hero-section').classList.contains('hidden') || document.getElementById('catalog-section').children.length === 0) {
                renderHero();
                renderGrid();
                document.getElementById('catalog-section').classList.remove('hidden');
            }
        });

        function renderHero() {
            if (allAnime.length === 0) return;
            const topAnime = allAnime[0];
            const cover = topAnime.cover || "https://via.placeholder.com/800x400/050811/e50914";
            document.getElementById('hero-bg').style.backgroundImage = `url('${cover}')`;
            document.getElementById('hero-title').innerText = topAnime.title;
            document.getElementById('hero-synopsis').innerText = topAnime.synopsis || "Streaming donghua kualitas HD tanpa lag.";
            document.getElementById('hero-play-btn').onclick = () => openModal(topAnime);
            document.getElementById('hero-section').classList.remove('hidden');
        }

        function renderGrid() {
            const catalogEl = document.getElementById('catalog');
            catalogEl.innerHTML = '';
            
            allAnime.forEach(anime => {
                const card = document.createElement('div');
                card.className = "premium-card rounded-lg overflow-hidden cursor-pointer relative";
                const cover = anime.cover || "https://via.placeholder.com/200x300/050811/e50914";
                
                card.innerHTML = `
                    <div class="relative aspect-[2/3]">
                        <img src="${cover}" loading="lazy" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#050811] to-transparent p-2 pt-6">
                            <span class="bg-[#e50914] text-white text-[8px] md:text-[9px] font-black px-1.5 py-0.5 rounded shadow">${anime.total_episodes || '?'} Eps</span>
                        </div>
                    </div>
                    <div class="p-2 bg-[#050811]">
                        <h3 class="font-bold text-[10px] md:text-xs text-gray-200 line-clamp-2 leading-tight">${anime.title}</h3>
                    </div>
                `;
                card.onclick = () => openModal(anime);
                catalogEl.appendChild(card);
            });
        }

        // MODAL EPISODE
        function openModal(anime) {
            document.getElementById('modal-title').innerText = anime.title;
            document.getElementById('modal-ep-count').innerText = `${anime.total_episodes || 0} Episode Tersedia`;
            const epList = document.getElementById('modal-ep-list');
            epList.innerHTML = '';

            if (anime.episodes) {
                let eps = Object.keys(anime.episodes).map(k => ({ epId: k, ...anime.episodes[k] }));
                eps.sort((a, b) => (parseFloat(b.number.replace(/[^\d.]/g, '')) || 0) - (parseFloat(a.number.replace(/[^\d.]/g, '')) || 0));

                eps.forEach(ep => {
                    epList.innerHTML += `
                        <button onclick="playVideo('${anime.id}', '${ep.epId}')" class="w-full text-left p-3 bg-white/5 hover:bg-white/10 border border-white/5 hover:border-[#e50914] rounded-lg flex items-center gap-3 transition">
                            <div class="w-8 h-8 rounded-full bg-black/40 border border-white/10 flex items-center justify-center text-xs font-black text-[#e50914]">
                                ${ep.number.replace(/[^\d]/g, '') || '▶'}
                            </div>
                            <div class="flex-1">
                                <span class="block text-xs font-bold text-white line-clamp-1">${ep.title || 'Episode ' + ep.number}</span>
                                <span class="block text-[8px] text-gray-400 font-bold uppercase tracking-widest">Sub Indo</span>
                            </div>
                        </button>
                    `;
                });
            } else {
                epList.innerHTML = `<p class="text-xs text-gray-500 col-span-full text-center py-4">Menunggu sinkronisasi video...</p>`;
            }
            document.getElementById('episode-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('episode-modal').classList.add('hidden'); }

        // PEMUTAR VIDEO & SERVER
        function playVideo(animeId, epId) {
            closeModal();
            document.getElementById('hero-section').classList.add('hidden');
            document.getElementById('catalog-section').classList.add('hidden');
            
            const anime = allAnime.find(a => a.id === animeId);
            const ep = anime.episodes[epId];
            
            document.getElementById('player-title').innerText = `${anime.title} - ${ep.number}`;
            loadComments(animeId);
            
            const mirrors = document.getElementById('mirror-list');
            mirrors.innerHTML = '';
            
            if (ep.videoUrl) {
                document.getElementById('video-frame-container').innerHTML = `<iframe id="main-iframe" src="${ep.videoUrl}" allowfullscreen class="w-full h-full absolute top-0 left-0 border-0"></iframe>`;
                mirrors.innerHTML += `<button onclick="switchServer('${ep.videoUrl}', this)" class="server-btn bg-[#e50914] text-white border-red-600 border text-[10px] font-bold px-3 py-1.5 rounded-md">Server Utama</button>`;
                
                if (ep.mirrors) {
                    ep.mirrors.forEach((m, idx) => {
                        if(!m.link.includes('javascript')) {
                            mirrors.innerHTML += `<button onclick="switchServer('${m.link}', this)" class="server-btn bg-white/5 text-gray-400 border border-white/5 hover:text-white text-[10px] font-bold px-3 py-1.5 rounded-md">Mirror ${idx+1}</button>`;
                        }
                    });
                }
            }
            document.getElementById('player-section').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchServer(url, btn) {
            document.getElementById('main-iframe').src = url;
            document.querySelectorAll('.server-btn').forEach(b => {
                b.className = "server-btn bg-white/5 text-gray-400 border border-white/5 hover:text-white text-[10px] font-bold px-3 py-1.5 rounded-md";
            });
            btn.className = "server-btn bg-[#e50914] text-white border-red-600 border text-[10px] font-bold px-3 py-1.5 rounded-md";
        }
        function closePlayer() { goHome(); }

        // KOMENTAR SYSTEM
        function loadComments(animeId) {
            currentAnimeId = animeId;
            db.ref(`comments/${animeId}`).on('value', (snap) => {
                const data = snap.val();
                const container = document.getElementById('comments-display');
                container.innerHTML = '';
                document.getElementById('comment-count').innerText = data ? Object.keys(data).length : 0;
                
                if(data) {
                    Object.values(data).reverse().forEach(c => {
                        container.innerHTML += `
                            <div class="flex gap-3">
                                <img src="${c.avatar}" class="w-8 h-8 rounded-full border border-white/10 mt-1">
                                <div class="bg-black/40 rounded-xl rounded-tl-none p-3 border border-white/5 flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[10px] font-bold text-[#e50914]">${c.name}</span>
                                        <span class="text-[8px] text-gray-600">${new Date(c.time).toLocaleDateString()}</span>
                                    </div>
                                    <p class="text-xs text-gray-300 leading-relaxed">${c.text}</p>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = `<p class="text-[10px] text-gray-500 italic text-center">Jadilah yang pertama berkomentar!</p>`;
                }
            });
        }

        function postComment() {
            const text = document.getElementById('comment-text').value;
            if(!text.trim() || !currentUser || !currentAnimeId) return;
            
            db.ref(`users/${currentUser.uid}/profile`).once('value', (snap) => {
                const profile = snap.val();
                db.ref(`comments/${currentAnimeId}`).push({
                    uid: currentUser.uid,
                    name: profile ? profile.displayName : currentUser.displayName,
                    avatar: currentUser.photoURL,
                    text: text,
                    time: Date.now()
                }).then(() => { document.getElementById('comment-text').value = ''; });
            });
        }
    </script>
</body>
</html>

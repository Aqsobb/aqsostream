<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Premium Cinematic</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased min-h-screen flex flex-col">

    <div id="initial-loader" class="fixed inset-0 z-[100] bg-[#050811] flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative w-24 h-24 mb-4">
            <div class="absolute inset-0 border-t-4 border-[#e50914] rounded-full loader-spin"></div>
            <div class="absolute inset-2 border-r-4 border-white/20 rounded-full loader-spin-reverse"></div>
            <div class="absolute inset-0 flex items-center justify-center font-black text-[#e50914] text-xl tracking-tighter">AQSO</div>
        </div>
        <p class="text-gray-400 text-xs font-bold tracking-[0.3em] uppercase animate-pulse">Menghubungkan Database...</p>
    </div>

    <nav class="fixed w-full z-50 nav-blur transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex justify-between items-center">
            <h1 class="font-extrabold text-2xl tracking-tighter cursor-pointer" onclick="switchTab('home')">
                AQSO<span class="text-[#e50914]">STREAM</span>
            </h1>
            
            <div id="auth-section">
                <button id="btn-login" onclick="loginGoogle()" class="btn-netflix text-white text-sm font-bold px-6 py-2 rounded-full flex items-center gap-2 hidden">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="white"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
                    Masuk
                </button>
                
                <div id="user-profile" class="hidden flex items-center gap-4">
                    <div class="text-right hidden md:block">
                        <p id="user-display-name" class="text-sm font-bold text-white"></p>
                        <button onclick="openSettings()" class="text-[10px] text-gray-400 hover:text-white uppercase tracking-widest transition">Pengaturan Akun</button>
                    </div>
                    <img id="user-avatar" src="" onclick="openSettings()" class="w-10 h-10 rounded-full border-2 border-[#e50914] cursor-pointer hover:opacity-80 transition shadow-lg">
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-20 pb-12 w-full flex-1">
        
        <div id="hero-section" class="relative w-full h-[60vh] hidden">
            <div id="hero-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-1000"></div>
            <div class="absolute inset-0 hero-gradient"></div>
            <div class="absolute inset-0 flex flex-col justify-end pb-12 px-4 md:px-12 max-w-7xl mx-auto">
                <span class="bg-[#e50914] text-white text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded w-max mb-3">Baru Rilis</span>
                <h2 id="hero-title" class="text-4xl md:text-6xl font-black mb-4 leading-tight drop-shadow-2xl max-w-3xl"></h2>
                <p id="hero-synopsis" class="text-sm md:text-base text-gray-300 max-w-2xl line-clamp-3 mb-6 font-medium"></p>
                <button id="hero-play-btn" class="bg-white hover:bg-gray-200 text-black font-bold py-3 px-8 rounded shadow-xl w-max flex items-center gap-2 transition">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Putar Sekarang
                </button>
            </div>
        </div>

        <div id="catalog-section" class="max-w-7xl mx-auto px-4 md:px-8 mt-12 hidden">
            <h3 class="text-xl font-bold mb-6 text-white border-l-4 border-[#e50914] pl-3">Katalog Utama</h3>
            <div id="catalog" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6"></div>
            
            <div id="pagination" class="flex justify-center items-center gap-4 mt-12 hidden">
                <button onclick="changePage(-1)" id="btn-prev" class="bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded shadow font-bold disabled:opacity-30 transition border border-white/10">Sebelumnya</button>
                <span id="page-info" class="font-bold text-gray-400">Hal 1</span>
                <button onclick="changePage(1)" id="btn-next" class="bg-white/5 hover:bg-white/10 px-5 py-2.5 rounded shadow font-bold disabled:opacity-30 transition border border-white/10">Selanjutnya</button>
            </div>
        </div>

        <section id="player-section" class="hidden max-w-6xl mx-auto px-4 py-8 animate-fade-in">
            <button onclick="closePlayer()" class="text-gray-400 hover:text-white text-sm flex items-center gap-2 mb-4 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> Kembali ke Katalog
            </button>
            
            <h2 id="player-title" class="text-2xl md:text-3xl font-black mb-6">Memuat Player...</h2>
            
            <div class="relative w-full pb-[56.25%] bg-black rounded-2xl shadow-2xl overflow-hidden border border-white/5" id="video-frame-container"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white/5 p-5 md:p-6 rounded-2xl border border-white/5 shadow-lg">
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                            <svg class="w-4 h-4 text-[#e50914]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
                            Pilih Server Video
                        </h3>
                        <div id="mirror-list" class="flex flex-wrap gap-2 md:gap-3"></div>
                    </div>

                    <div class="bg-white/5 p-5 md:p-6 rounded-2xl border border-white/5 shadow-lg">
                        <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                            Komentar <span id="comment-count" class="text-[#e50914] text-sm bg-red-900/30 px-2 py-0.5 rounded">0</span>
                        </h3>
                        
                        <div id="comment-box" class="mb-8">
                            <div id="comment-input-area" class="hidden">
                                <textarea id="comment-text" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-[#e50914] transition resize-none" rows="3" placeholder="Bagaimana pendapatmu tentang episode ini?"></textarea>
                                <button onclick="postComment()" class="mt-3 bg-[#e50914] hover:bg-red-700 text-white text-xs font-bold py-2.5 px-6 rounded-lg float-right transition">Kirim Komentar</button>
                                <div class="clear-both"></div>
                            </div>
                            <div id="comment-lock" class="p-6 text-center border border-dashed border-white/10 rounded-xl bg-black/20">
                                <svg class="w-8 h-8 mx-auto text-gray-600 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                                <p class="text-sm text-gray-400 mb-3">Kamu harus login untuk ikut berdiskusi.</p>
                                <button onclick="loginGoogle()" class="text-white bg-white/10 hover:bg-white/20 border border-white/10 text-xs font-bold py-2 px-4 rounded transition">Masuk Sekarang</button>
                            </div>
                        </div>
                        <div id="comments-display" class="space-y-5 max-h-[500px] overflow-y-auto pr-2"></div>
                    </div>
                </div>

                <div class="bg-white/5 p-5 md:p-6 rounded-2xl border border-white/5 h-max sticky top-24">
                    <h3 class="font-bold mb-3 text-[#e50914] flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Sinopsis
                    </h3>
                    <p id="player-synopsis" class="text-xs md:text-sm text-gray-400 leading-relaxed"></p>
                </div>
            </div>
        </section>
    </main>

    <div id="episode-modal" class="fixed inset-0 modal-bg z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-[#050811] w-full max-w-3xl rounded-2xl border border-white/10 shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="relative h-40 md:h-56 bg-black overflow-hidden">
                <img id="modal-cover" src="" class="w-full h-full object-cover opacity-40 blur-sm mix-blend-overlay">
                <div class="absolute inset-0 bg-gradient-to-t from-[#050811] to-transparent"></div>
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/50 hover:bg-[#e50914] text-white rounded-full p-2 transition backdrop-blur border border-white/10">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <div class="absolute bottom-0 left-0 p-6 w-full">
                    <h2 id="modal-title" class="text-2xl md:text-3xl font-black text-white leading-tight drop-shadow-lg">Judul Anime</h2>
                    <span id="modal-ep-count" class="text-xs text-[#e50914] font-bold mt-1 block tracking-wider uppercase">0 Episode Tersedia</span>
                </div>
            </div>
            <div class="p-4 md:p-6 overflow-y-auto flex-1 bg-[#050811]" id="modal-ep-list"></div>
        </div>
    </div>

    <div id="settings-modal" class="fixed inset-0 modal-bg z-[70] hidden flex items-center justify-center p-4">
        <div class="bg-[#050811] w-full max-w-md rounded-2xl p-6 md:p-8 border border-white/10 shadow-2xl">
            <h2 class="text-xl font-black mb-6 text-center">Pengaturan Profil</h2>
            <div class="space-y-6">
                <div class="flex flex-col items-center gap-4 mb-6">
                    <img id="edit-avatar" src="" class="w-24 h-24 rounded-full border-4 border-[#e50914] shadow-lg">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-2">Nama Tampilan (Komentar)</label>
                    <input type="text" id="edit-name" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 text-sm text-white focus:border-[#e50914] outline-none transition">
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeSettings()" class="flex-1 bg-white/5 hover:bg-white/10 py-3 rounded-xl font-bold transition border border-white/5 text-sm">Batal</button>
                    <button onclick="saveProfile()" class="flex-1 bg-[#e50914] hover:bg-red-700 py-3 rounded-xl font-bold transition shadow-lg text-sm text-white">Simpan Perubahan</button>
                </div>
                <button onclick="logout()" class="w-full mt-2 text-xs text-gray-500 hover:text-red-500 transition underline pb-2">Logout dari Sistem</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

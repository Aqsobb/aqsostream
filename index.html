<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQSO STREAM - Social Cinematic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050811; color: #e2e8f0; }
        .nav-blur { background: rgba(5, 8, 17, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hero-gradient { background: linear-gradient(0deg, #050811 0%, rgba(5,8,17,0) 100%); }
        .premium-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .premium-card:hover { background: rgba(255,255,255,0.07); border-color: #e50914; transform: translateY(-4px); }
        .btn-netflix { background: #e50914; transition: all 0.2s; shadow: 0 4px 14px 0 rgba(229, 9, 20, 0.39); }
        .btn-netflix:hover { background: #ff0a16; transform: scale(1.02); }
        .aspect-video iframe { width: 100%; height: 100%; position: absolute; top: 0; left: 0; border-radius: 12px; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e50914; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 nav-blur">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex justify-between items-center">
            <h1 class="font-extrabold text-2xl tracking-tighter cursor-pointer" onclick="switchTab('home')">
                AQSO<span class="text-[#e50914]">STREAM</span>
            </h1>
            
            <div id="auth-section">
                <button id="btn-login" onclick="loginGoogle()" class="btn-netflix text-white text-sm font-bold px-6 py-2 rounded-full">
                    Masuk
                </button>
                
                <div id="user-profile" class="hidden flex items-center gap-4">
                    <div class="text-right hidden md:block">
                        <p id="user-display-name" class="text-sm font-bold text-white"></p>
                        <button onclick="openSettings()" class="text-[10px] text-gray-400 hover:text-white uppercase tracking-widest">Pengaturan Akun</button>
                    </div>
                    <img id="user-avatar" src="" onclick="openSettings()" class="w-10 h-10 rounded-full border-2 border-[#e50914] cursor-pointer shadow-lg hover:opacity-80 transition">
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-20 pb-12">
        <div id="hero-section" class="relative w-full h-[60vh] hidden">
            <div id="hero-bg" class="absolute inset-0 bg-cover bg-center"></div>
            <div class="absolute inset-0 hero-gradient"></div>
            <div class="absolute inset-0 flex flex-col justify-end pb-12 px-8 max-w-7xl mx-auto">
                <h2 id="hero-title" class="text-4xl md:text-6xl font-black mb-4 leading-tight"></h2>
                <button id="hero-play-btn" class="bg-white text-black font-bold py-3 px-8 rounded w-max flex items-center gap-2 transition hover:bg-gray-200">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Putar
                </button>
            </div>
        </div>

        <div id="catalog-section" class="max-w-7xl mx-auto px-4 md:px-8 mt-12">
            <div id="catalog" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
        </div>

        <section id="player-section" class="hidden max-w-5xl mx-auto px-4 py-12 animate-fade-in">
            <h2 id="player-title" class="text-3xl font-extrabold mb-6">Judul Anime</h2>
            <div class="relative w-full pb-[56.25%] bg-black rounded-2xl shadow-2xl overflow-hidden border border-white/5" id="video-frame-container"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mt-8">
                <div class="lg:col-span-2 space-y-6">
                    <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Pilih Server</h3>
                        <div id="mirror-list" class="flex flex-wrap gap-3"></div>
                    </div>

                    <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                        <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                            Komentar <span id="comment-count" class="text-gray-500 text-sm">0</span>
                        </h3>
                        
                        <div id="comment-box" class="mb-8">
                            <div id="comment-input-area" class="hidden">
                                <textarea id="comment-text" class="w-full bg-black/40 border border-white/10 rounded-xl p-4 text-sm focus:outline-none focus:border-[#e50914] transition" placeholder="Tulis pendapatmu..."></textarea>
                                <button onclick="postComment()" class="mt-3 bg-[#e50914] text-white text-xs font-bold py-2 px-6 rounded-lg float-right">Kirim</button>
                                <div class="clear-both"></div>
                            </div>
                            <div id="comment-lock" class="p-6 text-center border border-dashed border-white/10 rounded-xl">
                                <p class="text-sm text-gray-500 mb-2">Kamu harus login untuk berkomentar</p>
                                <button onclick="loginGoogle()" class="text-[#e50914] text-sm font-bold hover:underline">Masuk Sekarang</button>
                            </div>
                        </div>

                        <div id="comments-display" class="space-y-6">
                            </div>
                    </div>
                </div>

                <div class="bg-white/5 p-6 rounded-2xl border border-white/5 h-max">
                    <h3 class="font-bold mb-4">Sinopsis</h3>
                    <p id="player-synopsis" class="text-sm text-gray-400 leading-relaxed"></p>
                </div>
            </div>
        </section>
    </main>

    <div id="settings-modal" class="fixed inset-0 modal-bg z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-[#111827] w-full max-w-md rounded-3xl p-8 border border-white/5 shadow-2xl">
            <h2 class="text-2xl font-black mb-6">Pengaturan Profil</h2>
            <div class="space-y-6">
                <div class="flex flex-col items-center gap-4 mb-6">
                    <img id="edit-avatar" src="" class="w-24 h-24 rounded-full border-4 border-[#e50914]">
                    <span class="text-xs text-gray-500 italic">Avatar disinkronkan dengan Google</span>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase tracking-widest block mb-2">Nama Tampilan</label>
                    <input type="text" id="edit-name" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-sm focus:border-[#e50914] outline-none">
                </div>
                <div class="flex gap-4 pt-4">
                    <button onclick="closeSettings()" class="flex-1 bg-white/5 hover:bg-white/10 py-3 rounded-xl font-bold transition">Batal</button>
                    <button onclick="saveProfile()" class="flex-1 bg-[#e50914] py-3 rounded-xl font-bold transition">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Sama seperti V4)
        const firebaseConfig = {
            apiKey: "AIzaSyCsUEn7Arp5q1OVCh6jRssfZT31yiaZuag",
            authDomain: "dtabase-80c9a.firebaseapp.com",
            databaseURL: "https://dtabase-80c9a-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "dtabase-80c9a",
            storageBucket: "dtabase-80c9a.firebasestorage.app",
            messagingSenderId: "800365836046",
            appId: "1:800365836046:web:bc8ecc9112f014a6e9095f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        let allAnime = [];
        let currentAnimeId = null;
        let currentUser = null;

        // --- AUTH ENGINE ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                // Cek data profil kustom di database
                db.ref(`users/${user.uid}/profile`).on('value', (snap) => {
                    const profile = snap.val();
                    const name = profile ? profile.displayName : user.displayName;
                    document.getElementById('user-display-name').innerText = name;
                    document.getElementById('user-avatar').src = user.photoURL;
                    document.getElementById('edit-name').value = name;
                    document.getElementById('edit-avatar').src = user.photoURL;
                });

                document.getElementById('btn-login').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');
                document.getElementById('comment-input-area').classList.remove('hidden');
                document.getElementById('comment-lock').classList.add('hidden');
            } else {
                currentUser = null;
                document.getElementById('btn-login').classList.remove('hidden');
                document.getElementById('user-profile').classList.add('hidden');
                document.getElementById('comment-input-area').classList.add('hidden');
                document.getElementById('comment-lock').classList.remove('hidden');
            }
        });

        function loginGoogle() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }

        // --- PROFILE SETTINGS ---
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveProfile() {
            const newName = document.getElementById('edit-name').value;
            db.ref(`users/${currentUser.uid}/profile`).update({ displayName: newName })
              .then(() => { alert("Profil diperbarui!"); closeSettings(); });
        }

        // --- COMMENT ENGINE ---
        function loadComments(animeId) {
            currentAnimeId = animeId;
            const ref = db.ref(`comments/${animeId}`);
            ref.on('value', (snap) => {
                const data = snap.val();
                const container = document.getElementById('comments-display');
                container.innerHTML = '';
                document.getElementById('comment-count').innerText = data ? Object.keys(data).length : 0;
                
                if(data) {
                    Object.values(data).reverse().forEach(c => {
                        container.innerHTML += `
                            <div class="flex gap-4 group">
                                <img src="${c.avatar}" class="w-10 h-10 rounded-full border border-white/10">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-xs font-bold text-white">${c.name}</span>
                                        <span class="text-[10px] text-gray-500">${new Date(c.time).toLocaleDateString()}</span>
                                    </div>
                                    <p class="text-sm text-gray-300 leading-relaxed">${c.text}</p>
                                </div>
                            </div>
                        `;
                    });
                }
            });
        }

        function postComment() {
            const text = document.getElementById('comment-text').value;
            if(!text.trim()) return;
            
            db.ref(`users/${currentUser.uid}/profile`).once('value', (snap) => {
                const profile = snap.val();
                db.ref(`comments/${currentAnimeId}`).push({
                    uid: currentUser.uid,
                    name: profile ? profile.displayName : currentUser.displayName,
                    avatar: currentUser.photoURL,
                    text: text,
                    time: Date.now()
                }).then(() => {
                    document.getElementById('comment-text').value = '';
                });
            });
        }

        // --- DATA FETCHING (Katalog) ---
        db.ref('anichin_database').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                allAnime = Object.keys(data).map(key => ({ id: key, ...data[key] }))
                    .filter(i => i.title && i.id !== "single_scrapes")
                    .sort((a,b) => b.timestamp - a.timestamp);
                renderGrid();
            }
        });

        function renderGrid() {
            const container = document.getElementById('catalog');
            container.innerHTML = '';
            allAnime.forEach(a => {
                const card = document.createElement('div');
                card.className = "premium-card rounded-2xl overflow-hidden cursor-pointer p-2";
                card.innerHTML = `
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden mb-3">
                        <img src="${a.cover}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 hover:opacity-100 transition duration-300">
                             <div class="bg-white/20 backdrop-blur-md p-3 rounded-full"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
                        </div>
                    </div>
                    <h3 class="text-xs font-bold line-clamp-2 px-1">${a.title}</h3>
                `;
                card.onclick = () => openPlayer(a);
                container.appendChild(card);
            });
            document.getElementById('loader').style.display = 'none';
        }

        // --- PLAYER ENGINE ---
        function openPlayer(anime) {
            document.getElementById('catalog-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
            document.getElementById('player-title').innerText = anime.title;
            document.getElementById('player-synopsis').innerText = anime.synopsis || "Saksikan di AQSO STREAM.";
            
            const firstEpKey = Object.keys(anime.episodes || {})[0];
            if(firstEpKey) {
                const ep = anime.episodes[firstEpKey];
                document.getElementById('video-frame-container').innerHTML = `<iframe id="main-iframe" src="${ep.videoUrl}" allowfullscreen></iframe>`;
                
                const mirrors = document.getElementById('mirror-list');
                mirrors.innerHTML = `<button onclick="switchServer('${ep.videoUrl}', this)" class="bg-[#e50914] text-white text-[10px] font-bold px-4 py-2 rounded-lg">Server 1</button>`;
                if(ep.mirrors) ep.mirrors.forEach((m, idx) => {
                    mirrors.innerHTML += `<button onclick="switchServer('${m.link}', this)" class="bg-white/5 text-gray-400 text-[10px] font-bold px-4 py-2 rounded-lg hover:bg-white/10">Server ${idx+2}</button>`;
                });
            }
            loadComments(anime.id);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchServer(url, btn) {
            document.getElementById('main-iframe').src = url;
            const btns = document.querySelectorAll('#mirror-list button');
            btns.forEach(b => { b.className = "bg-white/5 text-gray-400 text-[10px] font-bold px-4 py-2 rounded-lg hover:bg-white/10"; });
            btn.className = "bg-[#e50914] text-white text-[10px] font-bold px-4 py-2 rounded-lg";
        }

        function closePlayer() {
            document.getElementById('catalog-section').classList.remove('hidden');
            document.getElementById('player-section').classList.add('hidden');
        }
    </script>
</body>
                                                                                                    </html>
